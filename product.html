</header>

<div class="product-container">

    <div class="product-image">
        <img id="product-img" src="" alt="">
    </div>

    <div class="product-info">

        <h1 id="product-name"></h1>
        <p class="price" id="product-price"></p>

        <div class="options">

            <label>Размер</label>
            <select id="size">
                <option>S</option>
                <option>M</option>
                <option>L</option>
                <option>XL</option>
            </select>

            <label>Цвет</label>
            <select id="color">
                <option>Чёрный</option>
                <option>Белый</option>
                <option>Коричневый</option>
                <option>Зеленый</option>
            </select>

        </div>

        <button class="add-btn" onclick="addToCartFromPage()">
            Добавить в корзину
        </button>

    </div>

</div>

<!-- УВЕДОМЛЕНИЕ -->
 <div id="toast" class="toast">
    <img id="toast-img" src="" alt="">
    <div>
        <h4>✔ Добавлено в корзину</h4>
        <p id="toast-text"></p>
    </div>

    <a href="cart.html" class="toast-btn">Открыть</a>
</div>

<script src="product.js"></script>
<script src="script.js"></script>
